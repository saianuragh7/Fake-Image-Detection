openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API for Fake Image Detection — verifies if uploaded images are real or AI-generated.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: detection
    description: Image authenticity detection
  - name: analytics
    description: Aggregate stats and dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scans:
    get:
      operationId: listScans
      tags: [detection]
      summary: List recent image scans
      description: Returns the most recent image scans, newest first.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: List of scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scan"
    post:
      operationId: analyzeImage
      tags: [detection]
      summary: Analyze an uploaded image for authenticity
      description: Accepts an image upload, runs the fake-image-detection model, and returns the prediction.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to analyze (PNG, JPG, JPEG, WEBP).
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "400":
          description: Invalid image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scans/{id}:
    get:
      operationId: getScan
      tags: [detection]
      summary: Get a single scan by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [analytics]
      summary: Aggregate detection stats for the dashboard
      responses:
        "200":
          description: Stats payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /stats/timeseries:
    get:
      operationId: getStatsTimeseries
      tags: [analytics]
      summary: Daily breakdown of real vs fake scans
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
      responses:
        "200":
          description: Daily counts of real vs fake
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeseriesPoint"

  /stats/confidence:
    get:
      operationId: getConfidenceDistribution
      tags: [analytics]
      summary: Confidence score distribution buckets
      responses:
        "200":
          description: Confidence distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfidenceBucket"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Verdict:
      type: string
      enum: [real, fake]

    Scan:
      type: object
      required:
        [
          id,
          fileName,
          mimeType,
          fileSize,
          width,
          height,
          verdict,
          confidence,
          fakeProbability,
          realProbability,
          processingMs,
          signals,
          previewDataUrl,
          createdAt,
        ]
      properties:
        id:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        fileSize:
          type: integer
          description: File size in bytes
        width:
          type: integer
        height:
          type: integer
        verdict:
          $ref: "#/components/schemas/Verdict"
        confidence:
          type: number
          description: Confidence in the verdict, 0–100
        fakeProbability:
          type: number
          description: Probability the image is fake/AI generated, 0–100
        realProbability:
          type: number
          description: Probability the image is real, 0–100
        processingMs:
          type: integer
          description: Time taken to process in milliseconds
        signals:
          type: array
          description: Per-feature signals from the model that influenced the verdict
          items:
            $ref: "#/components/schemas/Signal"
        previewDataUrl:
          type: string
          description: A small data-URL thumbnail of the analyzed image for display in history.
        createdAt:
          type: string
          format: date-time

    Signal:
      type: object
      required: [name, score, weight, description]
      properties:
        name:
          type: string
          description: Human-readable signal name
        score:
          type: number
          description: Signal score on a 0–100 scale (higher = more suspicious of being fake)
        weight:
          type: number
          description: Relative weight of this signal in the final verdict, 0–1
        description:
          type: string
          description: Short explanation of what this signal measures

    Stats:
      type: object
      required:
        [
          totalScans,
          realCount,
          fakeCount,
          avgConfidence,
          avgProcessingMs,
          accuracy,
          last24hScans,
        ]
      properties:
        totalScans:
          type: integer
        realCount:
          type: integer
        fakeCount:
          type: integer
        avgConfidence:
          type: number
        avgProcessingMs:
          type: number
        accuracy:
          type: number
          description: Reported model accuracy on the validation set, 0–100
        last24hScans:
          type: integer

    TimeseriesPoint:
      type: object
      required: [date, real, fake]
      properties:
        date:
          type: string
          description: ISO date (YYYY-MM-DD)
        real:
          type: integer
        fake:
          type: integer

    ConfidenceBucket:
      type: object
      required: [bucket, count]
      properties:
        bucket:
          type: string
          description: Confidence range label (e.g. "50-60%")
        count:
          type: integer
